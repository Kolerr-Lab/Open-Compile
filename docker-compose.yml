version: '3.8'

services:
  opencompile:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencompile:latest
    container_name: opencompile-agi
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Cloud Models (Set these in your local .env file)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # Local Model Config
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5-coder:7b
      - OPENCOMPILE_MODEL=${OPENCOMPILE_MODEL:-qwen2.5-coder:7b}
    volumes:
      - ./generated-projects:/app/generated-projects
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - opencompile-net
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: opencompile-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - opencompile-net

volumes:
  ollama_data:
    driver: local

networks:
  opencompile-net:
    driver: bridge
