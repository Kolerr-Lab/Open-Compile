version: '3.8'

services:
  opencompile:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencompile:latest
    container_name: opencompile-agi
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      # Mount output directory
      - ./generated-projects:/app/generated-projects
      # Mount vector DB storage
      - opencompile-vectordb:/app/knowledge-base
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - opencompile-network
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Web UI Service (optional, for future development)
  # webui:
  #   build:
  #     context: ./webui
  #     dockerfile: Dockerfile
  #   image: opencompile-webui:latest
  #   container_name: opencompile-webui
  #   ports:
  #     - "8080:80"
  #   environment:
  #     - API_URL=http://opencompile:3000
  #   depends_on:
  #     - opencompile
  #   networks:
  #     - opencompile-network

volumes:
  opencompile-vectordb:
    driver: local

networks:
  opencompile-network:
    driver: bridge
